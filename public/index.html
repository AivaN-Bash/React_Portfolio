<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#01060f" />
    <meta name="description" content="Phawat Tanajiranon — Backend Developer based in Bangkok, Thailand. Node.js, Python, PostgreSQL." />
    <meta name="author" content="Phawat Tanajiranon" />

    <!-- Favicon -->
    <link rel="icon"             href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png.svg" />
    <link rel="manifest"         href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:title"       content="Beam — Backend Developer" />
    <meta property="og:description" content="Bangkok-based backend dev. Node.js, Python, PostgreSQL and more." />
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://AivaN-Bash.github.io/React_Portfolio" />
    <meta property="og:image"        content="https://AivaN-Bash.github.io/React_Portfolio/favicon.svg" />
    <meta property="og:image:width"  content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Beam — Backend Developer" />
    <meta name="twitter:description" content="Bangkok-based backend dev. Node.js, Python, PostgreSQL." />
    <meta name="twitter:image"       content="https://AivaN-Bash.github.io/React_Portfolio/favicon.svg" />

    <!-- Performance: open connection before CSS requests fonts -->
    <link rel="preconnect"   href="https://fonts.googleapis.com" />
    <link rel="preconnect"   href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Preload Cinzel display font — eliminates heading FOIT on first paint -->
    <link rel="preload"
      href="https://fonts.gstatic.com/s/cinzel/v23/8vIU7ww63mVu7gt79mT7.woff2"
      as="font" type="font/woff2" crossorigin />

    <!-- Fonts — display=swap prevents invisible text flash (FOIT) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />

    <!-- Preload first travel photo — loaded before JS executes -->
    <link rel="preload" as="image"
      href="%PUBLIC_URL%/photos/dollywood-work.jpg"
      fetchpriority="high" />

    <title>Beam · Portfolio</title>

    <!-- GitHub Pages SPA redirect: restores path after 404.html redirect -->
    <script>
      (function() {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          var base = window.location.pathname.split('?')[0];
          history.replaceState(null, null, base + '/' + p + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
